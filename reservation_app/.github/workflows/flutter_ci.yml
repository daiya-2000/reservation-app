name: Flutter CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🔄 リポジトリをチェックアウト
        uses: actions/checkout@v3

      - name: 🐦 Flutter 環境をセットアップ
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.8'  # ← プロジェクトのFlutterバージョンに合わせて

      - name: 📦 依存パッケージを取得
        run: flutter pub get

      - name: 🧪 テストを実行
        run: flutter test
